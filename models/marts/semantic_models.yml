version: 2

models:
  - name: dim_players
    description: >
      Player dimension table — one row per NBA player. The primary lookup for
      player identity, biographical info, draft details, and combine measurements.
      Join this to fact tables on player_id.
    semantic_model:
      enabled: true
      name: players
    columns:
      - name: player_id
        description: Primary key — unique identifier for each player.
        entity:
          type: primary
          name: player
        data_tests:
          - unique
          - not_null
      - name: full_name
        description: Player's full display name.
        dimension:
          type: categorical
      - name: first_name
        description: Player's first name.
        dimension:
          type: categorical
      - name: last_name
        description: Player's last name.
        dimension:
          type: categorical
      - name: is_active
        description: Boolean — whether the player is on an active NBA roster.
        dimension:
          type: categorical
      - name: roster_status
        description: Roster status field from common_player_info.
        dimension:
          type: categorical
      - name: team_id
        description: Foreign key to dim_teams — current team.
        entity:
          type: foreign
          name: team
      - name: team_name
        description: Current team's full name.
        dimension:
          type: categorical
      - name: team_abbreviation
        description: Current team's 3-letter abbreviation.
        dimension:
          type: categorical
      - name: birthdate
        description: Player's date of birth.
      - name: country
        description: Player's country of origin.
        dimension:
          type: categorical
      - name: college
        description: College or university the player attended before the NBA.
        dimension:
          type: categorical
      - name: height
        description: Player height.
      - name: weight
        description: Player weight.
      - name: position
        description: Primary position (e.g., Guard, Forward, Center).
        dimension:
          type: categorical
      - name: jersey
        description: Current jersey number.
      - name: seasons_experience
        description: Number of NBA seasons played.
      - name: from_year
        description: First year in the NBA.
      - name: to_year
        description: Most recent year active in the NBA.
      - name: draft_year
        description: Year the player was drafted.
        dimension:
          type: categorical
      - name: draft_round
        description: Round in which the player was drafted.
        dimension:
          type: categorical
      - name: pick_in_round
        description: Pick number within the draft round.
      - name: overall_pick
        description: Overall pick number across the full draft.
      - name: combine_height
        description: Height measured at the NBA Draft Combine (shoes on).
      - name: combine_weight
        description: Weight measured at the NBA Draft Combine.
      - name: combine_wingspan
        description: Wingspan measured at the NBA Draft Combine.
      - name: combine_max_vertical
        description: Max vertical leap measured at the NBA Draft Combine (inches).
      - name: combine_lane_agility_time
        description: Lane agility drill time at the NBA Draft Combine (seconds).
      - name: combine_sprint_time
        description: 3/4 court sprint time at the NBA Draft Combine (seconds).
      - name: greatest_75_flag
        description: Flag for NBA 75th Anniversary Team members.
        dimension:
          type: categorical

  - name: dim_teams
    description: >
      Team dimension table — one row per NBA franchise. The primary lookup for
      team identity, arena, leadership, and all-time records.
      Join to fact tables on team_id.
    semantic_model:
      enabled: true
      name: teams
    columns:
      - name: team_id
        description: Primary key — unique identifier for each team.
        entity:
          type: primary
          name: team
        data_tests:
          - unique
          - not_null
      - name: team_name
        description: Full franchise name (e.g., Los Angeles Lakers).
        dimension:
          type: categorical
      - name: team_abbreviation
        description: 3-letter team abbreviation (e.g., LAL).
        dimension:
          type: categorical
      - name: team_nickname
        description: Team nickname (e.g., Lakers).
        dimension:
          type: categorical
      - name: team_city
        description: City the team represents.
        dimension:
          type: categorical
      - name: team_state
        description: State the team is based in.
        dimension:
          type: categorical
      - name: year_founded
        description: Year the franchise was founded.
      - name: arena
        description: Name of the team's home arena.
        dimension:
          type: categorical
      - name: arena_capacity
        description: Seating capacity of the home arena.
      - name: owner
        description: Current team owner(s).
        dimension:
          type: categorical
      - name: general_manager
        description: Current general manager.
        dimension:
          type: categorical
      - name: head_coach
        description: Current head coach.
        dimension:
          type: categorical
      - name: g_league_affiliate
        description: NBA G League affiliate team.
        dimension:
          type: categorical
      - name: total_games_played
        description: All-time total games played by this franchise in the dataset.
      - name: total_wins
        description: All-time total wins by this franchise in the dataset.
      - name: total_losses
        description: All-time total losses by this franchise in the dataset.
      - name: all_time_win_pct
        description: All-time win percentage for this franchise in the dataset.

  - name: dim_games
    description: >
      Game dimension table — one row per NBA game. Provides full game context
      including date, season, matchup, TV network, attendance, and officials.
      Join to fact tables on game_id.
    semantic_model:
      enabled: true
      name: games
    agg_time_dimension: game_date
    columns:
      - name: game_id
        description: Primary key — unique identifier for each game.
        entity:
          type: primary
          name: game
        data_tests:
          - unique
          - not_null
      - name: game_date
        description: Date the game was played.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: game_year
        description: Calendar year the game was played.
      - name: game_month
        description: Month number the game was played (1-12).
      - name: game_day_of_week
        description: Day of the week the game was played (0=Sunday in Snowflake).
      - name: season_id
        description: NBA season identifier.
      - name: season
        description: NBA season label (e.g., 2021-22).
        dimension:
          type: categorical
      - name: season_type
        description: Game type — Regular Season, Playoffs, Preseason, etc.
        dimension:
          type: categorical
      - name: team_id_home
        description: Foreign key to dim_teams for the home team.
        entity:
          type: foreign
          name: team_home
      - name: team_id_away
        description: Foreign key to dim_teams for the away team.
        entity:
          type: foreign
          name: team_away
      - name: winning_team_id
        description: Team ID of the game winner.
        entity:
          type: foreign
          name: winning_team
      - name: national_tv_network
        description: National TV broadcaster (e.g., ESPN, TNT). Null for local-only games.
        dimension:
          type: categorical
      - name: attendance
        description: Number of fans in attendance.
      - name: went_to_overtime
        description: Boolean — true if the game went to overtime.
        dimension:
          type: categorical
      - name: point_differential
        description: Absolute final score difference between the two teams.
      - name: officials_crew
        description: Comma-separated list of referee names for the game.
      - name: matchup
        description: Home team matchup string.
        dimension:
          type: categorical
    metrics:
      - name: game_count
        description: Count of NBA games on the schedule.
        label: Game Count
        type: simple
        agg: count_distinct
        expr: game_id
      - name: attended_game_count
        description: Count of games with recorded attendance.
        label: Attended Game Count
        type: simple
        agg: sum
        expr: case when attendance is not null then 1 else 0 end
      - name: overtime_game_count
        description: Count of games that went to overtime.
        label: Overtime Game Count
        type: simple
        agg: sum_boolean
        expr: went_to_overtime

  - name: fct_games
    description: >
      Core game fact table — one row per NBA game with full box score stats for
      both teams, quarter-by-quarter scoring, advanced stats, and derived fields.
      The primary fact table for any game-level analysis or aggregation.
    semantic_model:
      enabled: true
      name: game_box_scores
    agg_time_dimension: game_date
    derived_semantics:
      entities:
        - name: game_box_score
          expr: game_id
          type: primary
    columns:
      - name: game_id
        description: Primary key — unique identifier for each game.
        entity:
          type: foreign
          name: game
        data_tests:
          - unique
          - not_null
      - name: game_date
        description: Date the game was played.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: team_id_home
        description: Foreign key to dim_teams — home team.
        entity:
          type: foreign
          name: team_home
      - name: team_id_away
        description: Foreign key to dim_teams — away team.
        entity:
          type: foreign
          name: team_away
      - name: pts_home
        description: Final points scored by the home team.
      - name: pts_away
        description: Final points scored by the away team.
      - name: winning_team_id
        description: Team ID of the game winner.
        entity:
          type: foreign
          name: winning_team
      - name: point_differential
        description: Absolute difference in final score.
      - name: total_pts_scored
        description: Combined points scored by both teams (pts_home + pts_away).
      - name: went_to_overtime
        description: Boolean — true if the game went to overtime.
        dimension:
          type: categorical
      - name: lead_changes
        description: Number of times the lead changed hands during the game.
      - name: times_tied
        description: Number of times the game was tied.
      - name: season
        description: NBA season label.
        dimension:
          type: categorical
      - name: season_type
        description: Game type — Regular Season, Playoffs, Preseason, etc.
        dimension:
          type: categorical
      - name: national_tv_network
        description: National TV broadcaster.
        dimension:
          type: categorical
      - name: attendance
        description: Number of fans in attendance.
    metrics:
      - name: box_score_game_count
        description: Count of completed NBA games in the box score fact table.
        label: Box Score Game Count
        type: simple
        agg: count_distinct
        expr: game_id
      - name: total_points_scored
        description: Total combined points scored across both teams.
        label: Total Points Scored
        type: simple
        agg: sum
        expr: total_pts_scored
      - name: avg_total_points_scored
        description: Average combined points scored per game.
        label: Avg Total Points Scored
        type: simple
        agg: average
        expr: total_pts_scored
      - name: avg_attendance
        description: Average attendance per game.
        label: Avg Attendance
        type: simple
        agg: average
        expr: attendance
      - name: overtime_box_score_game_count
        description: Count of box score games that went to overtime.
        label: Overtime Box Score Game Count
        type: simple
        agg: sum_boolean
        expr: went_to_overtime
      - name: avg_point_differential
        description: Average final score margin per game.
        label: Avg Point Differential
        type: simple
        agg: average
        expr: point_differential
      - name: avg_lead_changes
        description: Average number of lead changes per game.
        label: Avg Lead Changes
        type: simple
        agg: average
        expr: lead_changes
      - name: avg_times_tied
        description: Average number of ties per game.
        label: Avg Times Tied
        type: simple
        agg: average
        expr: times_tied

  - name: fct_team_game_stats
    description: >
      Team-game fact table — one row per team per game. Unpivoted from the wide
      home/away format, making it easy to query team performance across any date range
      or opponent without complex case statements. The go-to table for team analysis.
    semantic_model:
      enabled: true
      name: team_game_stats
    agg_time_dimension: game_date
    derived_semantics:
      entities:
        - name: team_game
          expr: concat(team_id, '-', game_id)
          type: primary
    columns:
      - name: game_id
        description: Foreign key referencing the game.
        entity:
          type: foreign
          name: game
        data_tests:
          - not_null
      - name: team_id
        description: Foreign key to dim_teams — the team this row represents.
        entity:
          type: foreign
          name: team
        data_tests:
          - not_null
      - name: game_date
        description: Date the game was played.
        granularity: day
        dimension:
          type: time
      - name: home_away
        description: Whether this team was the home or away team.
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ['home', 'away']
      - name: win_loss
        description: Game result from this team's perspective — 'W' or 'L'.
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ['W', 'L']
      - name: is_win
        description: Binary win indicator (1 = win, 0 = loss).
      - name: pts
        description: Points scored by this team.
      - name: opponent_pts
        description: Points scored by the opponent.
      - name: point_differential
        description: This team's pts minus opponent pts. Positive = win.
      - name: fg_pct
        description: Field goal percentage.
      - name: fg3_pct
        description: Three-point field goal percentage.
      - name: ft_pct
        description: Free throw percentage.
      - name: season
        description: NBA season label.
        dimension:
          type: categorical
      - name: season_type
        description: Game type — Regular Season, Playoffs, Preseason, etc.
        dimension:
          type: categorical
      - name: team_name
        description: Team full name.
        dimension:
          type: categorical
      - name: team_abbreviation
        description: Team abbreviation.
        dimension:
          type: categorical
      - name: opponent_team_id
        description: Opponent team identifier.
        entity:
          type: foreign
          name: opponent_team
      - name: opponent_team_name
        description: Opponent team full name.
        dimension:
          type: categorical
      - name: opponent_team_abbreviation
        description: Opponent team abbreviation.
        dimension:
          type: categorical
      - name: national_tv_network
        description: National TV broadcaster.
        dimension:
          type: categorical
      - name: went_to_overtime
        description: Boolean — true if the game went to overtime.
        dimension:
          type: categorical
      - name: reb
        description: Total rebounds.
      - name: ast
        description: Total assists.
      - name: tov
        description: Total turnovers.
      - name: fg3m
        description: Total made three-pointers.
      - name: ftm
        description: Total made free throws.
    metrics:
      - name: team_game_count
        description: Count of team-game appearances.
        label: Team Game Count
        type: simple
        agg: count
        expr: 1
      - name: team_wins
        description: Count of team wins.
        label: Team Wins
        type: simple
        agg: sum
        expr: is_win
      - name: team_losses
        description: Count of team losses.
        label: Team Losses
        type: simple
        agg: sum
        expr: case when is_win = 0 then 1 else 0 end
      - name: home_team_game_count
        description: Count of home team-games.
        label: Home Team Game Count
        type: simple
        agg: count
        expr: 1
        filter: "{{ Dimension('team_game__home_away') }} = 'home'"
      - name: away_team_game_count
        description: Count of away team-games.
        label: Away Team Game Count
        type: simple
        agg: count
        expr: 1
        filter: "{{ Dimension('team_game__home_away') }} = 'away'"
      - name: home_team_wins
        description: Count of home wins from the team's perspective.
        label: Home Team Wins
        type: simple
        agg: sum
        expr: is_win
        filter: "{{ Dimension('team_game__home_away') }} = 'home'"
      - name: away_team_wins
        description: Count of away wins from the team's perspective.
        label: Away Team Wins
        type: simple
        agg: sum
        expr: is_win
        filter: "{{ Dimension('team_game__home_away') }} = 'away'"
      - name: team_points
        description: Total points scored by teams.
        label: Team Points
        type: simple
        agg: sum
        expr: pts
      - name: avg_team_points
        description: Average points scored by a team per game.
        label: Avg Team Points
        type: simple
        agg: average
        expr: pts
      - name: avg_opponent_points_allowed
        description: Average points allowed per team-game.
        label: Avg Opponent Points Allowed
        type: simple
        agg: average
        expr: opponent_pts
      - name: avg_point_margin
        description: Average scoring margin per team-game.
        label: Avg Point Margin
        type: simple
        agg: average
        expr: point_differential
      - name: team_rebounds
        description: Total rebounds recorded by teams.
        label: Team Rebounds
        type: simple
        agg: sum
        expr: reb
      - name: team_assists
        description: Total assists recorded by teams.
        label: Team Assists
        type: simple
        agg: sum
        expr: ast
      - name: team_turnovers
        description: Total turnovers committed by teams.
        label: Team Turnovers
        type: simple
        agg: sum
        expr: tov
      - name: team_three_pointers_made
        description: Total three-pointers made by teams.
        label: Team Three Pointers Made
        type: simple
        agg: sum
        expr: fg3m
      - name: team_free_throws_made
        description: Total free throws made by teams.
        label: Team Free Throws Made
        type: simple
        agg: sum
        expr: ftm
      - name: overtime_team_game_count
        description: Count of team-games that went to overtime.
        label: Overtime Team Game Count
        type: simple
        agg: sum_boolean
        expr: went_to_overtime
      - name: nationally_televised_team_game_count
        description: Count of team-games shown on a national TV network.
        label: Nationally Televised Team Game Count
        type: simple
        agg: sum
        expr: case when national_tv_network is not null then 1 else 0 end

  - name: fct_draft
    description: >
      Draft fact table — one row per drafted NBA player. Combines draft pick details,
      combine measurements, and current career outcomes. Ideal for scouting analysis
      and demonstrating long-term draft value.
    semantic_model:
      enabled: true
      name: draft_history
    derived_semantics:
      entities:
        - name: draft_player
          expr: player_id
          type: primary
    columns:
      - name: player_id
        description: Primary key — unique identifier for each drafted player.
        entity:
          type: foreign
          name: player
        data_tests:
          - unique
          - not_null
      - name: player_name
        description: Player's full name at time of draft.
        dimension:
          type: categorical
      - name: draft_year
        description: Year the player was drafted.
        dimension:
          type: categorical
      - name: overall_pick
        description: Overall pick number in the draft.
        dimension:
          type: categorical
      - name: team_id
        description: Foreign key to dim_teams — team that drafted the player.
        entity:
          type: foreign
          name: team
      - name: is_active
        description: Whether the player is currently active in the NBA.
        dimension:
          type: categorical
      - name: seasons_experience
        description: Number of NBA seasons played (career longevity indicator).
      - name: greatest_75_flag
        description: Flag for NBA 75th Anniversary Team members — the ultimate career benchmark.
        dimension:
          type: categorical
      - name: draft_round
        description: Round in which the player was selected.
        dimension:
          type: categorical
      - name: team_name
        description: Drafting team name.
        dimension:
          type: categorical
      - name: team_abbreviation
        description: Drafting team abbreviation.
        dimension:
          type: categorical
      - name: position
        description: Player position.
        dimension:
          type: categorical
      - name: country
        description: Player country.
        dimension:
          type: categorical
      - name: college
        description: Player college.
        dimension:
          type: categorical
      - name: pre_draft_school
        description: Pre-draft school or organization.
        dimension:
          type: categorical
      - name: pre_draft_organization_type
        description: Pre-draft organization type.
        dimension:
          type: categorical
