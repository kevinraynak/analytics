semantic_models:

  # ---------------------------------------------------------------------------
  # fct_team_game_stats
  # Grain: one row per team per game
  # ---------------------------------------------------------------------------
  - name: team_game_stats
    description: >
      Team-game level fact table. One row per team per game. The primary semantic
      model for team performance metrics — wins, scoring, shooting efficiency,
      rebounding, assists, and game context.
    model: ref('fct_team_game_stats')

    entities:
      - name: team_game
        type: primary
        expr: "cast(game_id as varchar) || '-' || cast(team_id as varchar)"
      - name: game
        type: foreign
        expr: game_id
      - name: team
        type: foreign
        expr: team_id

    dimensions:
      - name: game_date
        type: time
        expr: game_date
        type_params:
          time_granularity: day

      - name: season
        type: categorical
        expr: cast(season as varchar)
        description: "NBA season label (e.g. 2021, 2022)"

      - name: season_type
        type: categorical
        description: "Regular Season, Playoffs, Preseason, etc."

      - name: home_away
        type: categorical
        description: "Whether the team was home or away"

      - name: team_name
        type: categorical
        description: "Full team name"

      - name: team_abbreviation
        type: categorical
        description: "3-letter team abbreviation (e.g. LAL, GSW)"

      - name: opponent_team_name
        type: categorical
        description: "Opponent full team name"

      - name: opponent_team_abbreviation
        type: categorical
        description: "Opponent 3-letter abbreviation"

      - name: national_tv_network
        type: categorical
        description: "National TV broadcaster (ESPN, TNT, ABC, etc.) — null for local games"

      - name: went_to_overtime
        type: categorical
        expr: cast(went_to_overtime as varchar)
        description: "Whether the game went to overtime (true/false)"

      - name: win_loss
        type: categorical
        description: "Game result from this team's perspective — W or L"

    measures:
      - name: wins
        description: "Total wins"
        agg: sum
        expr: is_win
        agg_time_dimension: game_date

      - name: games_played
        description: "Total games played"
        agg: count
        expr: game_id
        agg_time_dimension: game_date

      - name: total_pts
        description: "Total points scored"
        agg: sum
        expr: pts
        agg_time_dimension: game_date

      - name: avg_pts
        description: "Average points scored per game"
        agg: average
        expr: pts
        agg_time_dimension: game_date

      - name: total_fgm
        description: "Total field goals made"
        agg: sum
        expr: fgm
        agg_time_dimension: game_date

      - name: total_fga
        description: "Total field goals attempted"
        agg: sum
        expr: fga
        agg_time_dimension: game_date

      - name: total_fg3m
        description: "Total three-pointers made"
        agg: sum
        expr: fg3m
        agg_time_dimension: game_date

      - name: total_fg3a
        description: "Total three-pointers attempted"
        agg: sum
        expr: fg3a
        agg_time_dimension: game_date

      - name: total_ftm
        description: "Total free throws made"
        agg: sum
        expr: ftm
        agg_time_dimension: game_date

      - name: total_fta
        description: "Total free throws attempted"
        agg: sum
        expr: fta
        agg_time_dimension: game_date

      - name: avg_fg_pct
        description: "Average field goal percentage"
        agg: average
        expr: fg_pct
        agg_time_dimension: game_date

      - name: avg_ft_pct
        description: "Average free throw percentage"
        agg: average
        expr: ft_pct
        agg_time_dimension: game_date

      - name: total_reb
        description: "Total rebounds"
        agg: sum
        expr: reb
        agg_time_dimension: game_date

      - name: avg_reb
        description: "Average rebounds per game"
        agg: average
        expr: reb
        agg_time_dimension: game_date

      - name: total_ast
        description: "Total assists"
        agg: sum
        expr: ast
        agg_time_dimension: game_date

      - name: avg_ast
        description: "Average assists per game"
        agg: average
        expr: ast
        agg_time_dimension: game_date

      - name: total_pf
        description: "Total personal fouls committed"
        agg: sum
        expr: pf
        agg_time_dimension: game_date

      - name: total_plus_minus
        description: "Total cumulative plus/minus"
        agg: sum
        expr: plus_minus
        agg_time_dimension: game_date

      - name: avg_plus_minus
        description: "Average plus/minus per game"
        agg: average
        expr: plus_minus
        agg_time_dimension: game_date

      - name: total_attendance
        description: "Total cumulative attendance across games"
        agg: sum
        expr: attendance
        agg_time_dimension: game_date

      - name: avg_attendance
        description: "Average attendance per game"
        agg: average
        expr: attendance
        agg_time_dimension: game_date

      - name: total_point_differential
        description: "Total cumulative point differential (positive = net winning margin)"
        agg: sum
        expr: point_differential
        agg_time_dimension: game_date

      - name: avg_point_differential
        description: "Average point differential per game"
        agg: average
        expr: point_differential
        agg_time_dimension: game_date


  # ---------------------------------------------------------------------------
  # fct_games
  # Grain: one row per game
  # ---------------------------------------------------------------------------
  - name: games
    description: >
      Game-level fact table. One row per NBA game. Used for game-count metrics,
      attendance analysis, scoring pace, overtime rates, and game competitiveness
      (lead changes, times tied, point differential).
    model: ref('fct_games')

    entities:
      - name: game
        type: primary
        expr: game_id

    dimensions:
      - name: game_date
        type: time
        expr: game_date
        type_params:
          time_granularity: day

      - name: season
        type: categorical
        expr: cast(season as varchar)
        description: "NBA season label"

      - name: season_type
        type: categorical
        description: "Regular Season, Playoffs, Preseason, etc."

      - name: national_tv_network
        type: categorical
        description: "National TV broadcaster — null for local-only games"

      - name: went_to_overtime
        type: categorical
        expr: cast(went_to_overtime as varchar)
        description: "Whether the game went to overtime"

      - name: team_name_home
        type: categorical
        description: "Home team full name"

      - name: team_name_away
        type: categorical
        description: "Away team full name"

      - name: winning_team_name
        type: categorical
        description: "Full name of the winning team"

      - name: game_day_of_week
        type: categorical
        expr: cast(extract(dayofweek from game_date) as varchar)
        description: "Day of the week the game was played (0=Sunday in Snowflake)"

      - name: game_month
        type: categorical
        expr: cast(extract(month from game_date) as varchar)
        description: "Month number the game was played (1-12)"

    measures:
      - name: total_games
        description: "Total number of games"
        agg: count_distinct
        expr: game_id
        agg_time_dimension: game_date

      - name: game_attendance
        description: "Total cumulative game attendance"
        agg: sum
        expr: attendance
        agg_time_dimension: game_date

      - name: avg_game_attendance
        description: "Average attendance per game"
        agg: average
        expr: attendance
        agg_time_dimension: game_date

      - name: total_pts_scored
        description: "Total combined points scored by both teams"
        agg: sum
        expr: total_pts_scored
        agg_time_dimension: game_date

      - name: avg_total_pts_scored
        description: "Average combined points scored per game — pace indicator"
        agg: average
        expr: total_pts_scored
        agg_time_dimension: game_date

      - name: total_lead_changes
        description: "Total lead changes across all games"
        agg: sum
        expr: lead_changes
        agg_time_dimension: game_date

      - name: avg_lead_changes
        description: "Average lead changes per game"
        agg: average
        expr: lead_changes
        agg_time_dimension: game_date

      - name: total_times_tied
        description: "Total times games were tied"
        agg: sum
        expr: times_tied
        agg_time_dimension: game_date

      - name: avg_times_tied
        description: "Average times tied per game"
        agg: average
        expr: times_tied
        agg_time_dimension: game_date

      - name: overtime_games
        description: "Number of games that went to overtime"
        agg: sum
        expr: "case when went_to_overtime then 1 else 0 end"
        agg_time_dimension: game_date

      - name: avg_game_point_differential
        description: "Average absolute point differential per game (margin of victory)"
        agg: average
        expr: point_differential
        agg_time_dimension: game_date

      - name: home_wins
        description: "Number of games won by the home team"
        agg: sum
        expr: "case when wl_home = 'W' then 1 else 0 end"
        agg_time_dimension: game_date


  # ---------------------------------------------------------------------------
  # fct_draft
  # Grain: one row per drafted player
  # Uses a synthetic draft_date (June 1 of draft year) as the time dimension.
  # ---------------------------------------------------------------------------
  - name: draft
    description: >
      Draft fact table. One row per drafted NBA player. Used for draft analysis,
      scouting benchmarks, combine measurement comparisons, and career outcome
      analysis by pick position, team, school, or country.
    model: ref('fct_draft')

    entities:
      - name: player
        type: primary
        expr: player_id

    dimensions:
      - name: draft_date
        type: time
        expr: "date_from_parts(draft_year, 6, 1)"
        type_params:
          time_granularity: year
        description: "Synthetic date representing the draft (June 1 of draft year)"

      - name: draft_year
        type: categorical
        expr: cast(draft_year as varchar)
        description: "Year the player was drafted"

      - name: draft_round
        type: categorical
        expr: cast(draft_round as varchar)
        description: "Round in which the player was selected (1 or 2)"

      - name: position
        type: categorical
        description: "Player position (Guard, Forward, Center)"

      - name: country
        type: categorical
        description: "Player country of origin"

      - name: college
        type: categorical
        description: "College or university attended before the draft"

      - name: pre_draft_organization_type
        type: categorical
        description: "Type of pre-draft organization (College, International, High School, etc.)"

      - name: team_name
        type: categorical
        description: "Team that drafted the player"

      - name: is_active_flag
        type: categorical
        expr: cast(is_active as varchar)
        description: "Whether the player is currently active (1=active, 0=retired)"

    measures:
      - name: players_drafted
        description: "Total number of players drafted"
        agg: count
        expr: player_id
        agg_time_dimension: draft_date

      - name: active_players
        description: "Number of drafted players currently active in the NBA"
        agg: sum
        expr: is_active
        agg_time_dimension: draft_date

      - name: avg_seasons_experience
        description: "Average number of NBA seasons played"
        agg: average
        expr: seasons_experience
        agg_time_dimension: draft_date

      - name: avg_overall_pick
        description: "Average overall draft pick number"
        agg: average
        expr: overall_pick
        agg_time_dimension: draft_date

      - name: avg_combine_weight
        description: "Average body weight at the NBA Draft Combine (lbs)"
        agg: average
        expr: combine_weight
        agg_time_dimension: draft_date

      - name: avg_combine_max_vertical
        description: "Average max vertical leap at the Draft Combine (inches)"
        agg: average
        expr: combine_max_vertical
        agg_time_dimension: draft_date

      - name: avg_combine_standing_vertical
        description: "Average standing vertical leap at the Draft Combine (inches)"
        agg: average
        expr: combine_standing_vertical
        agg_time_dimension: draft_date

      - name: avg_combine_lane_agility
        description: "Average lane agility time at the Draft Combine (seconds — lower is better)"
        agg: average
        expr: combine_lane_agility_time
        agg_time_dimension: draft_date

      - name: avg_combine_sprint_time
        description: "Average 3/4 court sprint time at the Draft Combine (seconds — lower is better)"
        agg: average
        expr: combine_sprint_time
        agg_time_dimension: draft_date

      - name: avg_combine_bench_press
        description: "Average bench press reps at the Draft Combine"
        agg: average
        expr: combine_bench_press_reps
        agg_time_dimension: draft_date


  # ---------------------------------------------------------------------------
  # dim_teams
  # Grain: one row per NBA franchise
  # Dimension-only model — no measures (no time dimension available).
  # ---------------------------------------------------------------------------
  - name: teams
    description: >
      Team dimension table. One row per NBA franchise. Provides team identity,
      arena info, leadership, and conference/division for slicing fact metrics
      by team attributes. Join to fact tables via the team entity.
    model: ref('dim_teams')

    entities:
      - name: team
        type: primary
        expr: team_id

    dimensions:
      - name: team_name
        type: categorical
        description: "Full franchise name (e.g. Los Angeles Lakers)"

      - name: team_abbreviation
        type: categorical
        description: "3-letter team abbreviation (e.g. LAL)"

      - name: team_nickname
        type: categorical
        description: "Team nickname (e.g. Lakers)"

      - name: team_city
        type: categorical
        description: "City the team represents"

      - name: team_state
        type: categorical
        description: "State the team is based in"

      - name: year_founded
        type: categorical
        expr: cast(year_founded as varchar)
        description: "Year the franchise was founded"

      - name: arena
        type: categorical
        description: "Name of the home arena"

      - name: head_coach
        type: categorical
        description: "Current head coach"

      - name: general_manager
        type: categorical
        description: "Current general manager"

      - name: owner
        type: categorical
        description: "Current team owner(s)"

      - name: g_league_affiliate
        type: categorical
        description: "NBA G League affiliate team"