version: 2

sources:
  - name: nba
    description: >
      Raw NBA data loaded into Snowflake from the NBA API.
      This source powers the dbt NBA analytics project.
    database: analytics
    schema: dbt_kraynak
    tables:

      - name: common_player_info
        description: Detailed biographical and career information for every NBA player.
        columns:
          - name: person_id
            description: Primary key — unique identifier for each player.
            data_tests:
              - unique
              - not_null

      - name: draft_combine_stats
        description: Physical measurements and athletic testing results from the NBA Draft Combine.
        columns:
          - name: player_id
            description: Identifier for the draft combine participant.
            data_tests:
              - not_null

      - name: draft_history
        description: Historical NBA Draft picks including team, round, and pick number.
        columns:
          - name: person_id
            description: Identifier for the drafted player.
            data_tests:
              - not_null

      - name: game
        description: Game-level box score statistics for both the home and away team.
        columns:
          - name: game_id
            description: Identifier for the game.
            data_tests:
              - not_null

      - name: game_info
        description: Supplemental game information including attendance and game duration.
        columns:
          - name: game_id
            description: Identifier for the game.
            data_tests:
              - not_null

      - name: game_summary
        description: High-level game metadata including team matchups, game status, and TV info.
        columns:
          - name: game_id
            description: Identifier for the game.
            data_tests:
              - not_null

      - name: inactive_players
        description: Players listed as inactive (did not dress) for a given game.
        columns:
          - name: game_id
            description: Foreign key referencing the game.
            data_tests:
              - not_null

      - name: line_score
        description: Quarter-by-quarter and overtime scoring breakdown for each game.
        columns:
          - name: game_id
            description: Identifier for the game.
            data_tests:
              - not_null

      - name: officials
        description: Game officials (referees) assigned to each game.
        columns:
          - name: official_id
            description: Identifier for the official.
            data_tests:
              - not_null

      - name: other_stats
        description: Advanced game stats including paint points, fast break points, and lead changes.
        columns:
          - name: game_id
            description: Foreign key referencing the game.
            data_tests:
              - not_null

      - name: play_by_play
        description: Granular play-by-play event log for each game.
        columns:
          - name: game_id
            description: Foreign key referencing the game.
            data_tests:
              - not_null

      - name: player
        description: Master list of all NBA players with active/inactive status.
        columns:
          - name: id
            description: Primary key — unique identifier for each player.
            data_tests:
              - unique
              - not_null

      - name: team
        description: Master list of all NBA franchises.
        columns:
          - name: id
            description: Primary key — unique identifier for each team.
            data_tests:
              - unique
              - not_null

      - name: team_details
        description: Detailed team information including arena, ownership, and social media handles.
        columns:
          - name: team_id
            description: Identifier for the team.
            data_tests:
              - not_null

      - name: team_history
        description: Historical record of team city and nickname changes over time.
        columns:
          - name: team_id
            description: Foreign key referencing the team.
            data_tests:
              - not_null
